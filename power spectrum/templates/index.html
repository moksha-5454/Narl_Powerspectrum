<!DOCTYPE html>
<html>
<head>
  <title>Radar Graph Viewer</title>
  <style>
    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
    }
    .panel {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      width: 40%;
    }
    h3 { margin-top: 0; }
    img { max-width: 80%; margin: 10px 0; border:1px solid #ccc; border-radius:8px; }

    /* Tabs */
    .tabs {
      margin-top: 30px;
    }
    .tab-buttons {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }
    .tab-buttons button {
      margin: 0 10px;
      padding: 10px 20px;
      font-weight: bold;
      border: none;
      border-radius: 6px;
      background: #ddd;
      cursor: pointer;
      transition: background 0.3s;
    }
    .tab-buttons button.active {
      background: #007BFF;
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
  </style>
</head>
<body style="text-align:center;">
  <h2>Upload Radar Files</h2>

  <!-- Upload form -->
  <form id="upload-form" enctype="multipart/form-data" method="POST" action="/upload">
    <div class="container">
      <!-- Reference Panel -->
      <div class="panel">
        <h3>Reference File</h3>
        <input type="file" name="ref_file"><br><br>
        <label>Cycle Skip:</label>
        <input type="number" name="ref_skip" value="0" min="0"><br><br>
        <label>Cycle Analyze:</label>
        <input type="number" name="ref_analyze" value="1" min="1">
      </div>

      <!-- Test Panel -->
      <div class="panel">
        <h3>Test File</h3>
        <input type="file" name="test_file" required><br><br>
        <label>Cycle Skip:</label>
        <input type="number" name="test_skip" value="0" min="0"><br><br>
        <label>Cycle Analyze:</label>
        <input type="number" name="test_analyze" value="1" min="1">
      </div>
    </div>

    <br>
    <button type="submit">Upload & Process</button>
  </form>

  <!-- Tabbed Graph Viewer -->
  <div class="tabs" id="graphs" {% if showgraphs %}style="display:block;"{% else %}style="display:none;"{% endif %}>
    <h2>Generated Graphs</h2>

    <div class="tab-buttons">
      <button class="tab-btn active" data-target="g0">Graph 1</button>
      <button class="tab-btn" data-target="g1">Graph 2</button>
      <button class="tab-btn" data-target="g2">Graph 3</button>
    </div>
    <div class="tab-content active" id="g0">
      <img src="/graph/0?t=" alt="Graph 1">
    </div>
    <div class="tab-content" id="g1">
      <img src="/graph/1?t=" alt="Graph 2">
    </div>
    <div class="tab-content" id="g2">
      <img src="/graph/2?t=" alt="Graph 3">
    </div>
  </div>

  <script>
    // Add cache-busters to images on page load
    document.querySelectorAll("#graphs img").forEach((img) => {
      img.src = img.src + Date.now();
    });

    // Tab switching
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        // remove active class from all buttons
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        // hide all tab contents
        document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));

        // show selected tab
        document.getElementById(btn.dataset.target).classList.add("active");
      });
    });
  </script>
</body>
</html>
